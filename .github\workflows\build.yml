name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  build:
    name: Build OCBK APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            openjdk-17-jdk \
            unzip \
            autoconf \
            automake \
            libtool \
            libltdl-dev \
            pkg-config \
            zip \
            lld \
            cmake \
            ninja-build

      - name: Setup Android environment
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Build APK with Buildozer
        run: |
          # Убедимся, что все файлы на месте
          ls -la
          
          # Запуск сборки
          buildozer -v android debug
        env:
          # Принимаем лицензии Android SDK
          ANDROID_SDK_ROOT: $HOME/android-sdk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: OCBK-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Display build result
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          if [ -d "bin" ]; then
            echo "✅ APK files:" >> $GITHUB_STEP_SUMMARY
            ls -lh bin/*.apk >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No APK found" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed - bin directory not found" >> $GITHUB_STEP_SUMMARY
          fi
